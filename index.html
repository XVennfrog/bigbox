<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>My Web Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.12.0/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.12.0/mapbox-gl.css" rel="stylesheet">
  <style>
    body { margin: 0; padding: 0; font-family: Arial, sans-serif; }
    #map { position: absolute; top: 0; bottom: 0; width: 100%; }
    .legend {
      position: absolute;
      bottom: 24px;
      left: 24px;
      background: white;
      padding: 12px;
      border-radius: 6px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.25);
      font-size: 13px;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="legend">
    <strong>Legend</strong><br>
    <span style="display:inline-block;width:12px;height:12px;background:#2b83ba;"></span>
    Layer A<br>
    <span style="display:inline-block;width:12px;height:12px;background:#abdda4;"></span>
    Layer B
  </div>

  <script>
    mapboxgl.accessToken = 'pk.eyJ1IjoicGV0cm9sYXR1bSIsImEiOiJjbXFmanAzdDYxbjdvMnFxMzVuMWo4cW43In0.7XRGgEj6Y1Jl_0WWuwoLhA';

    const map = new mapboxgl.Map({
      container: 'map',
      style: 'mapbox://styles/petrolatum/cmqfh8aku000w01s70ryyg7on',
      center: [-79.942174, 40.435376],
      zoom: 10
    });

    map.addControl(new mapboxgl.NavigationControl());
  </script>
</body>
</html>
